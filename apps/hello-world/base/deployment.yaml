apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-world-app
spec:
  replicas: 1 # Por defecto en la base dejamos 1 sola réplica
  selector:
    matchLabels:
      app: hello-world
  template:
    metadata:
      labels:
        app: hello-world
    spec:
      containers:
      - name: web-container
        image: nginxdemos/hello:plain-text # <-- Cambiamos a esta imagen moderna y liviana
        ports:
        - containerPort: 80
